name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test on Ubuntu
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache deps + build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            native/svg_sanitizer_nif/target
          # Cargo.lock included so transitive Rust bumps invalidate the cache.
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock', 'native/svg_sanitizer_nif/Cargo.toml', 'native/svg_sanitizer_nif/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get

      - name: Compile + run malicious-SVG corpus tests
        env:
          SVG_SANITIZER_BUILD: "1"
        run: mix test --warnings-as-errors
