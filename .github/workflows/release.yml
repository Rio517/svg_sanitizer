name: Build precompiled NIFs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.16", "2.17"]
        job:
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-apple-darwin, os: macos-13 }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: false }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }

    steps:
      - uses: actions/checkout@v4

      - name: Derive crate version from tag
        id: ver
        shell: bash
        run: |
          # On a tag push (refs/tags/v0.1.0) emit 0.1.0; on manual dispatch
          # fall back to the workspace default so dry runs work.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.job.target }}

      - name: Build NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.5
        with:
          project-name: svg_hush_nif
          project-version: ${{ steps.ver.outputs.version }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross == true }}
          project-dir: "native/svg_hush_nif"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.build-crate.outputs.file-path }}
